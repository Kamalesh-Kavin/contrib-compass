name: Bug report
description: Something is broken or behaving unexpectedly
title: "fix: "
labels: ["bug", "triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug!  The more detail you provide, the faster we can fix it.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
      placeholder: "When I upload a PDF resume, the page returns a 500 error..."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      placeholder: "I expected to be redirected to /loading/... and see results."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Step-by-step instructions to reproduce the bug.
      placeholder: |
        1. Go to http://localhost:8000
        2. Click "Upload Resume" tab
        3. Upload a PDF file
        4. Click "Find Contributions"
        5. See error
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Paste any relevant error messages or stack traces here.
      render: text

  - type: dropdown
    id: environment
    attributes:
      label: How are you running ContribCompass?
      options:
        - "Local (uv run uvicorn ...)"
        - "Docker / docker-compose"
        - "Render deployment"
        - "Other"
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: "3.13.x"

  - type: checkboxes
    id: terms
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues and this is not a duplicate.
          required: true
        - label: I have provided enough detail to reproduce the bug.
          required: true
