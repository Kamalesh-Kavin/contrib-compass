# .github/workflows/lint.yml — Lint and format-check on every push and PR.
#
# Uses ruff for both linting and formatting (it replaces flake8 + isort +
# black).  If ruff reports any issues the workflow fails so code quality is
# enforced on every contribution.

name: lint

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint:
    name: ruff lint + format check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --all-extras

      # ruff check — flags style, import order, unused vars, etc.
      - name: Ruff lint
        run: uv run ruff check src/ tests/

      # ruff format --check — fails if any file would be reformatted
      - name: Ruff format check
        run: uv run ruff format --check src/ tests/
