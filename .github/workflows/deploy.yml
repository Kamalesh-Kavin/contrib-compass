# .github/workflows/deploy.yml — Trigger a Render deploy on push to main.
#
# After every successful push to main, this workflow fires a deploy hook at
# Render so the production service automatically redeploys with the latest code.
#
# Setup:
#   1. In Render dashboard → your service → Settings → Deploy Hook → copy URL.
#   2. In GitHub repo → Settings → Secrets → Actions → New secret:
#        Name:  RENDER_DEPLOY_HOOK_URL
#        Value: <the URL you copied>
#
# The workflow intentionally does NOT wait for the Render deploy to finish;
# it just triggers it.  Check the Render dashboard for deploy status.

name: deploy

on:
  push:
    branches: ["main"]

jobs:
  trigger-render-deploy:
    name: Trigger Render deploy
    runs-on: ubuntu-latest

    # Only run if RENDER_DEPLOY_HOOK_URL secret is set (skip in forks)
    if: ${{ vars.RENDER_DEPLOY_HOOK_URL != '' || secrets.RENDER_DEPLOY_HOOK_URL != '' }}

    steps:
      - name: Trigger Render deploy hook
        run: |
          curl --silent --show-error --fail \
            -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
          echo "Deploy hook triggered successfully."
